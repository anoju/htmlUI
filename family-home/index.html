<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>패밀리금융 테스트</title>
    <link rel="stylesheet" href="css/style.min.css" />
  </head>
  <body>
    <article class="card">
      <header class="card-header">
        <h1 class="card-title">김신한의 집</h1>
        <p class="card-subtitle">잘하고 있어요!</p>
      </header>

      <div
        id="cardBody"
        class="card-body type-1 level-1"
        role="button"
        aria-label="주택짓기, 레벨1, 클릭수 0/50"
      >
        <div class="architecture"></div>
        <div class="tool"></div>
      </div>

      <div class="card-footer">
        <ul>
          <li>
            <span class="icon" id="progressIcon">
              <svg width="32" height="32" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14.5" />
                <path
                  id="progressPath"
                  d="M16 1.5 A 14.5 14.5 0 1 1 16 30.5 A 14.5 14.5 0 1 1 16 1.5"
                />
              </svg>
              🏠
            </span>
            <!-- 현재 레별 표시, 마지막에는 '완성!' -->
            <span>Lv.1</span>
          </li>

          <!-- 클릭할수 있는 남은 시간 표시, 완성시 비노출 -->
          <li id="timerItem">
            <span class="icon">🔨</span>
            <span>23:59:59</span>
          </li>
        </ul>
      </div>
    </article>

    <script>
      (function () {
        const CONFIG = {
          MAX_LEVEL: 4,
          CLICKS_PER_LEVEL: 50,
          MAX_SESSION_CLICKS: 10,
          COOLDOWN_MS: 10 * 60 * 6000, // 60분
          TYPES: {
            1: "주택",
            2: "빌라",
            3: "아파트",
            4: "별장",
          },
        };

        const state = {
          type: 1, // 1~4 설정 가능
          level: 1,
          totalClicks: 0,
          sessionClicks: 0,
          isCoolingDown: false,
          nextAvailableTime: null,
          isAnimating: false,
        };

        const elements = {
          cardBody: document.getElementById("cardBody"),
          tool: document.querySelector(".tool"),
          progressPath: document.getElementById("progressPath"),
        };

        const CIRCUMFERENCE = 2 * Math.PI * 14.5;

        function setDisabledState(isDisabled) {
          if (isDisabled) {
            elements.cardBody.classList.add("disabled");
            elements.cardBody.setAttribute("aria-disabled", "true");
          } else {
            elements.cardBody.classList.remove("disabled");
            elements.cardBody.removeAttribute("aria-disabled");
          }
        }

        function updateUI() {
          const isCompleted = state.level === CONFIG.MAX_LEVEL;
          setDisabledState(state.isCoolingDown || isCompleted);

          // 접근성 속성 업데이트
          const typeName = CONFIG.TYPES[state.type];
          const progress = `${state.totalClicks}/${CONFIG.CLICKS_PER_LEVEL}`;
          elements.cardBody.setAttribute(
            "aria-label",
            `${typeName}짓기, 레벨${state.level}, 클릭수 ${progress}`,
          );

          // SVG 프로그래스 업데이트
          const ratio = state.totalClicks / CONFIG.CLICKS_PER_LEVEL;
          const offset = CIRCUMFERENCE - ratio * CIRCUMFERENCE;
          elements.progressPath.style.strokeDasharray = `${CIRCUMFERENCE}`;
          elements.progressPath.style.strokeDashoffset = offset;
        }

        function startCooldown() {
          state.isCoolingDown = true;
          state.nextAvailableTime = Date.now() + CONFIG.COOLDOWN_MS;

          setDisabledState(true);

          // 타이머 자동 해제 로직 (UI 업데이트 없이 상태만 처리)
          setTimeout(() => {
            state.isCoolingDown = false;
            state.sessionClicks = 0;
            state.nextAvailableTime = null;
            updateUI();
          }, CONFIG.COOLDOWN_MS);
        }

        function handleLevelUp() {
          if (state.totalClicks >= CONFIG.CLICKS_PER_LEVEL) {
            if (state.level < CONFIG.MAX_LEVEL) {
              state.level++;
              state.totalClicks = 0;
              updateUI();
            }
          }
        }

        function handleAction() {
          if (
            state.level === CONFIG.MAX_LEVEL ||
            state.isCoolingDown ||
            state.isAnimating
          )
            return;

          // 랜덤 위치 설정 (-10에서 80까지 10단위)
          const randomTop = Math.floor(Math.random() * 10) * 10 - 10;
          const isReverse = Math.random() < 0.5;

          elements.tool.style.top = `${randomTop}px`;
          elements.tool.classList.toggle("reverse", isReverse);

          // 애니메이션 실행
          state.isAnimating = true;
          elements.cardBody.classList.add("is-animating");

          setTimeout(() => {
            elements.cardBody.classList.remove("is-animating");
            state.isAnimating = false;
          }, 600);

          // 데이터 업데이트
          state.totalClicks++;
          state.sessionClicks++;

          if (state.sessionClicks >= CONFIG.MAX_SESSION_CLICKS) {
            startCooldown();
          }

          handleLevelUp();
          updateUI();
        }

        // 초기화
        function init() {
          if (!elements.cardBody) return;

          elements.cardBody.addEventListener("click", handleAction);

          updateUI();
        }

        init();
      })();
    </script>
  </body>
</html>
