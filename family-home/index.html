<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>패밀리금융 테스트</title>
    <link rel="stylesheet" href="css/style.min.css" />
  </head>
  <body>
    <article class="card">
      <header class="card-header">
        <h1 class="card-title">김신한의 집</h1>
        <p class="card-subtitle">잘하고 있어요!</p>
      </header>

      <div class="card-body">
        <!-- build-type-1 build-level-1 -->
        <div
          id="build"
          class="build-wrap"
          role="button"
          aria-label="주택짓기, 레벨1, 클릭수 0/50"
        >
          <div class="architecture"></div>
          <div id="buffContainer" class="buff-container"></div>
          <div class="tool">
            <div class="dust-container" id="dustContainer"></div>
          </div>
        </div>
      </div>

      <!-- bg 이미지 프리로더 -->
      <div
        id="preloader"
        style="
          width: 0;
          height: 0;
          overflow: hidden;
          position: absolute;
          pointer-events: none;
        "
      >
        <div class="architecture"></div>
        <div class="tool"></div>
      </div>

      <div class="card-footer">
        <ul>
          <li>
            <span class="icon" id="progressIcon">
              <svg width="32" height="32" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14.5" />
                <path
                  id="progressPath"
                  d="M16 1.5 A 14.5 14.5 0 1 1 16 30.5 A 14.5 14.5 0 1 1 16 1.5"
                />
              </svg>
              🏠
            </span>
            <!-- 현재 레별 표시, 마지막에는 '완성!' -->
            <span>Lv.1</span>
          </li>

          <!-- 클릭할수 있는 남은 시간 표시, 완성시 비노출 -->
          <li id="timerItem">
            <span class="icon">🔨</span>
            <span>23:59:59</span>
          </li>
        </ul>
      </div>
    </article>

    <script>
      (function () {
        const CONFIG = {
          MAX_LEVEL: 4,
          CLICKS_PER_LEVEL: 50,
          MAX_SESSION_CLICKS: 10,
          COOLDOWN_MS: 10 * 60 * 6000, // 60분
          TYPES: {
            1: "주택",
            2: "빌라",
            3: "아파트",
            4: "별장",
          },
        };

        const state = {
          type: 1, // 1~4 설정 가능
          level: 1,
          totalClicks: 45, // 테스트를 위해 임시로 45개 설정(누적 클릭수)
          sessionClicks: 0,
          isCoolingDown: false,
          nextAvailableTime: null,
          isAnimating: false,
        };

        const elements = {
          build: document.getElementById("build"),
          tool: document.querySelector(".tool"),
          dustContainer: document.getElementById("dustContainer"),
          buffContainer: document.getElementById("buffContainer"),
          progressPath: document.getElementById("progressPath"),
          preloader: document.getElementById("preloader"),
        };

        const CIRCUMFERENCE = 2 * Math.PI * 14.5;

        function setDisabledState(isDisabled) {
          if (isDisabled) {
            elements.build.classList.add("disabled");
            elements.build.setAttribute("aria-disabled", "true");
          } else {
            elements.build.classList.remove("disabled");
            elements.build.removeAttribute("aria-disabled");
          }
        }

        function readyUI() {
          const typeClass = `build-type-${state.type === 1 ? 1 : 2}`;
          const levelClass = `build-level-${state.level}`;
          elements.build.classList.add(typeClass, levelClass);
        }

        function updateUI() {
          const isCompleted = state.level === CONFIG.MAX_LEVEL;
          setDisabledState(state.isCoolingDown || isCompleted);

          // 접근성 속성 업데이트
          const typeName = CONFIG.TYPES[state.type];
          const progress = `${state.totalClicks}/${CONFIG.CLICKS_PER_LEVEL}`;
          elements.build.setAttribute(
            "aria-label",
            `${typeName}짓기, 레벨${state.level}, 클릭수 ${progress}`,
          );

          // SVG 프로그래스 업데이트
          const ratio = state.totalClicks / CONFIG.CLICKS_PER_LEVEL;
          const offset = CIRCUMFERENCE - ratio * CIRCUMFERENCE;
          elements.progressPath.style.strokeDasharray = `${CIRCUMFERENCE}`;
          elements.progressPath.style.strokeDashoffset = offset;

          // 프리로더 업데이트
          const nextLevel = state.level + 1;
          if (nextLevel <= CONFIG.MAX_LEVEL) {
            const nextTypeClass = `build-type-${state.type === 1 ? 1 : 2}`;
            const nextLevelClass = `build-level-${nextLevel}`;
            elements.preloader.className = `${nextTypeClass} ${nextLevelClass}`;
            elements.preloader.style.display = "block";
          } else {
            elements.preloader.style.display = "none";
          }
        }

        function startCooldown() {
          state.isCoolingDown = true;
          state.nextAvailableTime = Date.now() + CONFIG.COOLDOWN_MS;

          setDisabledState(true);

          // 타이머 자동 해제 로직 (UI 업데이트 없이 상태만 처리)
          setTimeout(() => {
            state.isCoolingDown = false;
            state.sessionClicks = 0;
            state.nextAvailableTime = null;
            updateUI();
          }, CONFIG.COOLDOWN_MS);
        }

        function handleLevelUp() {
          if (state.totalClicks >= CONFIG.CLICKS_PER_LEVEL) {
            if (state.level < CONFIG.MAX_LEVEL) {
              state.isAnimating = true; // 레벨업 연출 동안 클릭 차단

              // 레벨업 애니메이션 시작 (줌아웃)
              elements.build.classList.add("is-level-up");

              setTimeout(() => {
                // 기존 레벨 클래스 제거 및 신규 레벨 클래스 추가
                const oldClass = `build-level-${state.level}`;
                state.level++;
                const newClass = `build-level-${state.level}`;

                elements.build.classList.remove(oldClass);
                elements.build.classList.add(newClass);

                state.totalClicks = 0;
                updateUI();

                // 줌인 애니메이션 시작
                elements.build.classList.add("is-in");

                setTimeout(() => {
                  elements.build.classList.remove("is-level-up", "is-in");
                  state.isAnimating = false; // 모든 연출이 끝나면 차단 해제
                }, 300);
              }, 300);
            }
          }
        }

        function handleAction() {
          if (
            state.level === CONFIG.MAX_LEVEL ||
            state.isCoolingDown ||
            state.isAnimating
          )
            return;

          // 랜덤 위치 설정 (-10에서 80까지 10단위)
          const randomTop = Math.floor(Math.random() * 10) * 10 - 10;
          const isReverse = Math.random() < 0.5;

          elements.tool.style.top = `${randomTop}px`;
          elements.tool.classList.toggle("reverse", isReverse);

          // 애니메이션 실행
          state.isAnimating = true;
          elements.build.classList.add("is-animating");

          // 망치 애니메이션(0.15s)이 끝나는 시점에 먼지 발생
          setTimeout(() => {
            createDustParticles();
            createBuffParticles();
          }, 150);

          setTimeout(() => {
            elements.build.classList.remove("is-animating");
            state.isAnimating = false;
            handleLevelUp();
          }, 600);

          // 데이터 업데이트
          state.totalClicks++;
          state.sessionClicks++;

          if (state.sessionClicks >= CONFIG.MAX_SESSION_CLICKS) {
            startCooldown();
          }

          updateUI();
        }

        function createBuffParticles() {
          const particleCount = 12;
          // 겹침 방지를 위한 슬롯 생성 및 셔플
          const slots = Array.from({ length: particleCount }, (_, i) => i);
          for (let i = slots.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [slots[i], slots[j]] = [slots[j], slots[i]];
          }

          for (let i = 0; i < particleCount; i++) {
            const p = document.createElement("div");
            // const colors = ["is-gold", "is-green", "is-blue", "is-red"];
            const colors = ["is-gold", "is-green", "is-blue"];
            const colorClass =
              colors[Math.floor(Math.random() * colors.length)];
            p.className = `buff-particle ${colorClass}`;

            // 슬롯 기반 위치 계산 (10% ~ 90% 범위를 슬롯으로 나눔)
            const slotWidth = 80 / particleCount;
            const left =
              10 + slots[i] * slotWidth + Math.random() * slotWidth * 0.5 + "%";

            const size = Math.floor(Math.random() * 5) * 3 + 6 + "px"; // 6, 9, 12, 15, 18
            const duration = Math.floor(Math.random() * 4) * 0.3 + 0.9 + "s"; // 0.9, 1.2, 1.5, 1.8
            const delay = Math.random() * 0.3 + "s";
            const tx = (Math.random() - 0.5) * 40 + "px"; // 좌우 흔들림 폭
            const bottom = Math.floor(Math.random() * 6) * 3 + 10 + "%"; // 10, 13, 16, 19, 22, 25

            p.style.left = left;
            p.style.bottom = bottom;
            p.style.width = size;
            p.style.height = size;
            p.style.setProperty("--tx", tx);
            p.style.animationDuration = duration;
            p.style.animationDelay = delay;

            elements.buffContainer.appendChild(p);
            p.addEventListener("animationend", () => p.remove());
          }
        }

        function createDustParticles() {
          const particleCount = 12;
          for (let i = 0; i < particleCount; i++) {
            const dust = document.createElement("div");
            dust.className = "dust animate";

            // 랜덤한 방향과 거리 설정
            const dx = (Math.random() - 0.5) * 140 + "px";
            const dy = Math.random() * -40 + "px";

            dust.style.setProperty("--dx", dx);
            dust.style.setProperty("--dy", dy);

            // 애니메이션 딜레이 랜덤화
            dust.style.animationDelay = Math.random() * 0.1 + "s";

            elements.dustContainer.appendChild(dust);

            // 애니메이션 종료 후 요소 삭제
            dust.addEventListener("animationend", () => {
              dust.remove();
            });
          }
        }

        // 초기화
        function init() {
          if (!elements.build) return;
          readyUI();

          elements.build.addEventListener("click", handleAction);

          updateUI();
        }

        init();
      })();
    </script>
  </body>
</html>
