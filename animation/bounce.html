<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>72px Periodic Card Bounce</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --card-glass: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.2);
        --shadow-color: rgba(0, 0, 0, 0.6);
        --accent-color: #38bdf8;
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(circle at center, #1e293b, #0f172a);
        overflow: hidden;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      .container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 72x72 프리미엄 카드 디자인 */
      .card {
        width: 72px;
        height: 72px;
        background: var(--card-glass);
        backdrop-filter: blur(8px);
        border: 1.5px solid var(--card-border);
        border-radius: 12px;
        box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;

        /* 8초 주기 애니메이션 */
        animation: card-bounce 8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: bottom;
      }

      /* 내부 데코레이션 - 아이콘 느낌 */
      .card-inner {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--accent-color), #0ea5e9);
        box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
      }

      /* 카드 바닥 그림자 (카드 크기에 맞춤) */
      .shadow {
        width: 60px;
        height: 6px;
        background: var(--shadow-color);
        border-radius: 50%;
        margin-top: 30px;
        filter: blur(6px);
        animation: shadow-scale 8s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* 72px 크기에 최적화된 점프 애니메이션 */
      @keyframes card-bounce {
        /* 0% ~ 80%: 긴 대기 (6.4초) */
        0%,
        80% {
          transform: translateY(0) scale(1, 1);
        }
        /* 83%: 점프 준비 (빠른 준비 동작) */
        83% {
          transform: translateY(0) scale(1.15, 0.85);
        }
        /* 88%: 점프 피크 (비율에 맞는 적절한 높이) */
        88% {
          transform: translateY(-80px) scale(0.95, 1.05);
        }
        /* 93%: 착지 (72px 크기에 어울리는 탄성) */
        93% {
          transform: translateY(0) scale(1.2, 0.8);
        }
        /* 98%, 100%: 복구 */
        98%,
        100% {
          transform: translateY(0) scale(1, 1);
        }
      }

      /* 그림자 크기 및 투명도 조절 */
      @keyframes shadow-scale {
        0%,
        80% {
          transform: scale(1);
          opacity: 0.6;
        }
        83% {
          transform: scale(1.3);
          opacity: 0.9;
        }
        88% {
          transform: scale(0.4);
          opacity: 0.15;
        }
        93% {
          transform: scale(1.4);
          opacity: 0.9;
        }
        98%,
        100% {
          transform: scale(1);
          opacity: 0.6;
        }
      }

      .title {
        position: absolute;
        bottom: -60px;
        color: #475569;
        font-size: 0.7rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card"></div>
      <div class="shadow"></div>
      <h2 class="title">72x72 Card</h2>
    </div>
  </body>
</html>
