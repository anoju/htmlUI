<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우주 심연 (Deep Abyss)</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      #space-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .content-overlay {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 15vh;
        width: 100%;
        height: 100%;
        color: #fff;
        pointer-events: none;
      }
      .title {
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        margin-bottom: 1rem;
      }
      .subtitle {
        font-size: 1.2rem;
        font-weight: 300;
        color: #8080a0;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <canvas id="space-canvas"></canvas>

    <div class="content-overlay">
      <div class="title">THE ABYSS</div>
      <div class="subtitle">위로 갈수록 깊고 어두운 심연</div>
    </div>

    <script src="./galaxy.js"></script>
    <script>
      createGalaxyAnimation("space-canvas", {
        backgroundType: "linear",
        starDistribution: "bottom", // 별이 아래쪽으로 점점 많아지는 그라데이션 형태
        starDistributionPower: 10, // 강도를 대폭 높여 위쪽 절반은 별이 거의 없도록 설정
        backgroundColors: [
          "#000000", // Top: 완벽하고 어두운 심연
          "#02040a", // Middle: 아주 희미한 푸른빛
          "#0b1633", // Bottom: 별들이 몰려있는 아래쪽의 은하수 빛
        ],
        starDensity: 4000, // 몰린 쪽의 별이 더 촘촘하게 보이도록 전체 개수 증가
      });
    </script>
  </body>
</html>
