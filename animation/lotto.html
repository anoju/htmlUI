<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="시각적 화려함에 집중한 3D 느낌의 로또 인터랙션"
    />
    <title>Premium Random Picker Interaction</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;500;700&display=swap");

      :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(255, 255, 255, 0.1);
        --primary-color: #3b82f6;
        --primary-hover: #2563eb;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Outfit", "Noto Sans KR", sans-serif;
      }

      /* Machine Container */
      .machine-wrapper {
        height: 100dvh;
        position: relative;
        background: var(--bg-gradient);
        color: var(--text-main);
        display: flex;
        align-items: center;
        padding: 40px 20px;
        perspective: 800px; /* 3D 입체 투영점 적용 */
      }

      /* The Glass Circular Bowl */
      .bowl-glass {
        position: relative;
        width: calc(var(--container-radius, 70px) * 2);
        height: calc(var(--container-radius, 70px) * 2);
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.1),
          rgba(0, 0, 0, 0.4)
        );
        box-shadow:
          inset 0 0 40px rgba(255, 255, 255, 0.2),
          inset 0 -20px 40px rgba(0, 0, 0, 0.8),
          0 15px 35px rgba(0, 0, 0, 0.6),
          0 0 20px rgba(96, 165, 250, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.15);
        margin: 0 auto;
        z-index: 10;
        transform-style: preserve-3d;
      }

      /* Faux 3D Physics Ball Inside */
      .machine-ball {
        position: absolute;
        top: 50%;
        left: 50%;
        width: calc(var(--ball-radius, 19px) * 2);
        height: calc(var(--ball-radius, 19px) * 2);
        margin-top: calc(var(--ball-radius, 19px) * -1);
        margin-left: calc(var(--ball-radius, 19px) * -1);
        border-radius: 50%;
        box-shadow:
          inset -3px -3px 6px rgba(0, 0, 0, 0.5),
          inset 2px 2px 6px rgba(255, 255, 255, 0.7),
          0 5px 10px rgba(0, 0, 0, 0.5);
        user-select: none;
        will-change: transform;
        overflow: hidden;
      }

      /* Ball Inner Content (Numbers on opposite sides) */
      .ball-inner,
      .ball-inner-back {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 13px;
        font-weight: 800;
        color: #fff;
        backface-visibility: hidden;
      }

      /* Colors */
      .ball-yellow {
        background: radial-gradient(circle at 30% 30%, #fcd34d, #d97706);
      }
      .ball-blue {
        background: radial-gradient(circle at 30% 30%, #93c5fd, #2563eb);
      }
      .ball-red {
        background: radial-gradient(circle at 30% 30%, #fca5a5, #dc2626);
      }
      .ball-gray {
        background: radial-gradient(circle at 30% 30%, #d1d5db, #4b5563);
      }
      .ball-green {
        background: radial-gradient(circle at 30% 30%, #6ee7b7, #059669);
      }
    </style>
  </head>
  <body>
    <!-- 3D 겹침 효과 볼 혼합 머신 -->
    <section class="machine-wrapper" aria-hidden="true">
      <div class="bowl-glass" id="bowlGlass"></div>
    </section>

    <script>
      const lottoAnimation = (options = {}) => {
        // 1. 기본값과 사용자가 전달한 옵션 병합 (Defensive Object Merge)
        const config = {
          container: "#bowlGlass",
          totalBalls: 5, // 머신 안에 생성할 공 개수
          containerRadius: 100, // 머신(유리어항)의 물리적 충돌 반지름
          ballRadius: 25, // 각 공의 충돌 및 시각적 반지름
          maxSpeed: 5, // 공 이동 속도
          ballClasses: null, // 사용자 정의 클래스 (기본 배정 없음)
          ...options,
        };

        // 2. DOM 요소 방어적 참조
        const domNodes = {
          container: document.querySelector(config.container),
        };

        if (!domNodes.container) {
          console.error(
            "Lotto Component Error: 필수 DOM(머신)을 찾을 수 없습니다.",
          );
          return null;
        }

        // 3. 인스턴스 내부 상태 관리
        const machineBalls = [];
        let animationFrameId = null;

        // 4. 모듈화된 내부 클래스 정의
        class Faux3DBall {
          constructor(index) {
            this.index = index;
            this.el = document.createElement("div");
            this.el.className = "machine-ball";

            // ballClasses가 주어졌을 때만 적용하도록 방어적 로직
            this.customClass = "";
            if (config.ballClasses && config.ballClasses.length > 0) {
              this.customClass =
                config.ballClasses[index % config.ballClasses.length];
              this.el.classList.add(this.customClass);
            }

            // 시각적 고정 번호 (1번째부터 시작)
            this.id = "ball-" + (index + 1);

            // 앞면 번호
            this.innerEl = document.createElement("div");
            this.innerEl.className = "ball-inner";
            this.innerEl.textContent = index + 1;
            this.el.appendChild(this.innerEl);

            // 뒷면 번호
            this.innerBackEl = document.createElement("div");
            this.innerBackEl.className = "ball-inner-back";
            this.innerBackEl.textContent = index + 1;
            this.el.appendChild(this.innerBackEl);

            this.r = config.ballRadius;

            // 원 중심부터 임의 배치
            const angle = Math.random() * Math.PI * 2;
            const radiusPos = Math.random() * (config.containerRadius * 0.5);
            this.x = Math.cos(angle) * radiusPos;
            this.y = Math.sin(angle) * radiusPos;

            // 초기 무작위 레이어(zIndex) 배정
            this.el.style.zIndex = Math.floor(
              Math.random() * config.totalBalls * 2,
            );

            // 초기 랜덤 속도
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;

            // 시각적 3D 회전(Rotate) 설정
            this.rotX = Math.random() * 360;
            this.rotY = Math.random() * 360;
            this.rotZ = Math.random() * 360;
          }

          update() {
            // 유기적인 곡선 흔들림 강제
            this.vx += (Math.random() - 0.5) * 1.5;
            this.vy += (Math.random() - 0.5) * 1.5;

            this.x += this.vx;
            this.y += this.vy;

            const targetSpeed = config.maxSpeed;
            const speed2D = Math.hypot(this.vx, this.vy);

            if (speed2D > 0.1) {
              this.vx = (this.vx / speed2D) * targetSpeed;
              this.vy = (this.vy / speed2D) * targetSpeed;
            }

            // 2D 가장자리 벽 튕김 처리 (반사각 모델)
            const dist = Math.hypot(this.x, this.y);
            const boundary = config.containerRadius - this.r;

            if (dist > boundary) {
              const nx = this.x / dist;
              const ny = this.y / dist;

              // 공의 이동 방향이 벽 바깥쪽을 향하고 있을 때만 반사 (중복 충돌 방지)
              const dotProduct = this.vx * nx + this.vy * ny;
              if (dotProduct > 0) {
                const p = 2 * dotProduct;
                this.vx = this.vx - p * nx;
                this.vy = this.vy - p * ny;

                // 단 1회의 반사 이벤트 시점에만 순서 교차
                this.el.style.zIndex = Math.floor(
                  Math.random() * config.totalBalls * 2,
                );
              }

              // 화면 밖으로 벗어남 방지용 위치 보정 (안전 장치)
              this.x = nx * boundary;
              this.y = ny * boundary;
            }

            // 3D 회전치 누적 계산
            // 이동 방향(vx, vy)을 바탕으로 X, Y축 회전을 계산하여 굴러가는 듯한 3D 효과 연출
            this.rotX -= this.vy * 2.5;
            this.rotY += this.vx * 2.5;
            this.rotZ += this.vx * this.vy * 0.1; // 자연스러운 Z축 비틀림

            // 위치 렌더링 (공 컨테이너는 2D 평면상 이동만 수행하여 조명/그림자 고정)
            this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;

            // 3D 회전 렌더링 (공 내부의 번호만 3D로 회전하여 입체적으로 구르는 것처럼 연출)
            // translateZ를 통해 텍스트를 공 표면(반지름만큼 앞쪽)으로 밀어내어, 윤곽을 따라 궤도 회전을 하도록 만듭니다.
            this.innerEl.style.transform = `rotateX(${this.rotX}deg) rotateY(${this.rotY}deg) rotateZ(${this.rotZ}deg) translateZ(${this.r}px)`;
            this.innerBackEl.style.transform = `rotateX(${this.rotX}deg) rotateY(${this.rotY}deg) rotateZ(${this.rotZ}deg) rotateY(180deg) translateZ(${this.r}px)`;
          }
        }

        const startPhysicsLoop = () => {
          machineBalls.forEach((ball) => ball.update());
          animationFrameId = requestAnimationFrame(startPhysicsLoop);
        };

        const initMachine = () => {
          domNodes.container.style.setProperty(
            "--container-radius",
            `${config.containerRadius}px`,
          );
          domNodes.container.style.setProperty(
            "--ball-radius",
            `${config.ballRadius}px`,
          );
          domNodes.container.innerHTML = "";
          machineBalls.length = 0;
          for (let i = 0; i < config.totalBalls; i++) {
            const ball = new Faux3DBall(i);
            domNodes.container.appendChild(ball.el);
            machineBalls.push(ball);
          }
          startPhysicsLoop();
        };

        // 5. 컴포넌트 마운트
        initMachine();

        // 6. 메모리 누수 방지용 클린업(Unmount) 메서드 제공
        const destroy = () => {
          cancelAnimationFrame(animationFrameId);
          domNodes.container.innerHTML = "";
          machineBalls.length = 0;
        };

        // 외부 인터페이스 반환
        return {
          destroy: destroy,
        };
      };

      // ==========================================
      // 사용 예시 (옵션을 넘겨서 인스턴스화)
      // ==========================================
      const myLottoMachine = lottoAnimation({
        container: "#bowlGlass",
        totalBalls: 5, // 원하는 공 개수
        containerRadius: 70, // 머신 크기
        ballRadius: 19, // 공 크기
        maxSpeed: 3, // 공 이동 속도
        ballClasses: [
          "ball-yellow",
          "ball-blue",
          "ball-red",
          "ball-gray",
          "ball-green",
        ],
      });

      // 브라우저 닫힘(SPA 라우팅 이동 등) 대비 가비지 컬렉션 트리거
      window.addEventListener("unload", () => {
        if (myLottoMachine) myLottoMachine.destroy();
      });
    </script>
  </body>
</html>
