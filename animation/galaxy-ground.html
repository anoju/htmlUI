<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우주 지평선 (Ground Horizon)</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      #space-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .content-overlay {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: #fff;
        pointer-events: none;
      }
      .title {
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        margin-bottom: 1rem;
      }
      .subtitle {
        font-size: 1.2rem;
        font-weight: 300;
        color: #b0b0d0;
        text-shadow: 0 0 10px rgba(176, 176, 208, 0.5);
      }
      /* 바닥(지평선)을 표현하는 간단한 실루엣 */
      .ground {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 15vh;
        background: linear-gradient(to top, #000000, #0a0a0f);
        z-index: 3;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <canvas id="space-canvas"></canvas>
    <div class="ground"></div>

    <div class="content-overlay">
      <div class="title">STAR HORIZON</div>
      <div class="subtitle">지평선 위로 쏟아지는 별들</div>
    </div>

    <script src="./galaxy.js"></script>
    <script>
      createGalaxyAnimation("space-canvas", {
        backgroundType: "linear",
        starDistribution: "top", // 별이 위쪽으로 몰림
        starDistributionPower: 5, // 강도를 대폭 높여 아래쪽 절반은 별이 거의 없도록 설정
        backgroundColors: [
          "#020111", // Top: 심연의 우주
          "#120d2b", // Middle: 깊은 우주
          "#2b1836", // Bottom: 지평선 부근의 은은한 빛
        ],
        starDensity: 4000, // 몰린 쪽에 별이 쏟아지도록 밀도 조절
      });
    </script>
  </body>
</html>
