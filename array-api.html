<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Array API 정복하기</title>
    <style>
      :root {
        --bg-color: #0f172a; /* Slate 900 */
        --card-bg: #1e293b; /* Slate 800 */
        --text-primary: #f8fafc; /* Slate 50 */
        --text-secondary: #94a3b8; /* Slate 400 */
        --accent-color: #38bdf8; /* Sky 400 */
        --accent-hover: #0ea5e9; /* Sky 500 */
        --code-bg: #020617; /* Slate 950 */
        --border-color: #334155; /* Slate 700 */

        --badge-mutating: #f43f5e; /* Rose 500 */
        --badge-immutable: #10b981; /* Emerald 500 */
        --badge-read: #8b5cf6; /* Violet 500 */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        line-height: 1.6;
        padding-bottom: 4rem;
      }

      header {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 2rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 1rem;
      }

      .nav-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }

      .nav-tag {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }

      .nav-tag:hover {
        border-color: var(--accent-color);
        color: var(--accent-color);
      }

      main {
        display: grid;
        gap: 3rem;
      }

      section {
        scroll-margin-top: 120px;
      }

      .section-title {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-primary);
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 0.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        display: flex;
        flex-direction: column;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        border-color: var(--accent-color);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
      }

      .method-name {
        font-family: "Fira Code", monospace;
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--accent-color);
      }

      .badge {
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .badge.mutating {
        background: rgba(244, 63, 94, 0.2);
        color: var(--badge-mutating);
      }

      .badge.immutable {
        background: rgba(16, 185, 129, 0.2);
        color: var(--badge-immutable);
      }

      .badge.read {
        background: rgba(139, 92, 246, 0.2);
        color: var(--badge-read);
      }

      .card-desc {
        color: var(--text-secondary);
        font-size: 0.95rem;
        margin-bottom: 1rem;
        flex-grow: 1;
      }

      .code-block {
        background: var(--code-bg);
        padding: 1rem;
        border-radius: 8px;
        font-family: "Fira Code", monospace;
        font-size: 0.85rem;
        overflow-x: auto;
        border: 1px solid var(--border-color);
      }

      .code-line {
        display: block;
        margin-bottom: 0.25rem;
      }

      .comment {
        color: #64748b;
      }
      .keyword {
        color: #c4b5fd;
      }
      .string {
        color: #86efac;
      }
      .number {
        color: #fca5a5;
      }
      .function {
        color: #93c5fd;
      }

      .new-tag {
        display: inline-block;
        background: linear-gradient(90deg, #ff8a00, #e52e71);
        color: white;
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>JS Array API Master</h1>
        <p class="subtitle">
          자바스크립트 배열 메서드 완벽 정리 (ES6+ 및 최신 ES2023 포함)
        </p>
        <div class="nav-tags">
          <a href="#add-remove" class="nav-tag">추가/삭제</a>
          <a href="#search" class="nav-tag">검색/조회</a>
          <a href="#iterate" class="nav-tag">순회/변형</a>
          <a href="#sort" class="nav-tag">정렬/순서</a>
          <a href="#transform" class="nav-tag">구조 변환</a>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- 1. 요소 추가/삭제 -->
      <section id="add-remove">
        <h2 class="section-title">📦 요소 조작 (추가/삭제)</h2>
        <div class="grid" id="grid-add-remove"></div>
      </section>

      <!-- 2. 검색 및 조회 -->
      <section id="search">
        <h2 class="section-title">🔍 검색 및 조회</h2>
        <div class="grid" id="grid-search"></div>
      </section>

      <!-- 3. 순회 및 변형 -->
      <section id="iterate">
        <h2 class="section-title">🔄 순회 및 데이터 변형</h2>
        <div class="grid" id="grid-iterate"></div>
      </section>

      <!-- 4. 정렬 및 순서 -->
      <section id="sort">
        <h2 class="section-title">🔢 정렬 및 순서 변경</h2>
        <div class="grid" id="grid-sort"></div>
      </section>

      <!-- 5. 구조 변환 및 기타 -->
      <section id="transform">
        <h2 class="section-title">🛠 구조 변환 및 유틸리티</h2>
        <div class="grid" id="grid-transform"></div>
      </section>
    </main>

    <script>
      // 데이터 정의
      const apiData = [
        // 1. 요소 조작 (추가/삭제)
        {
          category: "add-remove",
          name: "push",
          desc: "배열의 <strong>끝</strong>에 하나 이상의 요소를 추가하고, 변경된 배열의 길이를 반환합니다.",
          type: "mutating",
          code: `const arr = ['🍎', '🍌'];
arr.push('🍊');
// arr: ['🍎', '🍌', '🍊']`,
        },
        {
          category: "add-remove",
          name: "pop",
          desc: "배열의 <strong>마지막</strong> 요소를 제거하고 그 요소를 반환합니다.",
          type: "mutating",
          code: `const arr = ['🍎', '🍌'];
const last = arr.pop();
// last: '🍌', arr: ['🍎']`,
        },
        {
          category: "add-remove",
          name: "unshift",
          desc: "배열의 <strong>앞</strong>에 하나 이상의 요소를 추가하고, 새로운 길이를 반환합니다.",
          type: "mutating",
          code: `const arr = ['🍌'];
arr.unshift('🍎');
// arr: ['🍎', '🍌']`,
        },
        {
          category: "add-remove",
          name: "shift",
          desc: "배열의 <strong>첫 번째</strong> 요소를 제거하고 그 요소를 반환합니다.",
          type: "mutating",
          code: `const arr = ['🍎', '🍌'];
const first = arr.shift();
// first: '🍎', arr: ['🍌']`,
        },
        {
          category: "add-remove",
          name: "splice",
          desc: "배열의 기존 요소를 삭제 또는 교체하거나 새 요소를 추가하여 내용을 변경합니다.",
          type: "mutating",
          code: `const arr = ['a', 'c', 'd'];
arr.splice(1, 0, 'b');
// arr: ['a', 'b', 'c', 'd']`,
        },
        {
          category: "add-remove",
          name: "toSpliced",
          desc: "splice()와 같지만 원본을 변경하지 않고 <strong>새로운 배열</strong>을 반환합니다.",
          type: "immutable",
          isNew: true,
          code: `const arr = ['a', 'c'];
const newArr = arr.toSpliced(1, 0, 'b');
// newArr: ['a', 'b', 'c']
// arr: ['a', 'c'] (변경 x)`,
        },
        {
          category: "add-remove",
          name: "with",
          desc: "특정 인덱스의 값을 변경하여 <strong>새로운 배열</strong>을 반환합니다. (arr[i] = val의 불변 버전)",
          type: "immutable",
          isNew: true,
          code: `const arr = ['a', 'b'];
const newArr = arr.with(1, 'x');
// newArr: ['a', 'x']`,
        },

        // 2. 검색 및 조회
        {
          category: "search",
          name: "at",
          desc: "정수 인덱스를 받아 해당 요소를 반환합니다. <strong>음수</strong>를 사용하여 뒤에서부터 접근 가능합니다.",
          type: "read",
          isNew: true,
          code: `const arr = ['a', 'b', 'c'];
arr.at(-1); // 'c'`,
        },
        {
          category: "search",
          name: "find",
          desc: "제공된 테스트 함수를 만족하는 <strong>첫 번째 요소</strong>의 값을 반환합니다.",
          type: "read",
          code: `const arr = [5, 12, 8];
arr.find(x => x > 10); // 12`,
        },
        {
          category: "search",
          name: "find (객체 찾기)",
          desc: "객체 배열에서 고유 아이디(id) 등 특정 조건을 만족하는 <strong>단일 객체</strong>를 찾아 반환합니다.",
          type: "read",
          code: `const users = [
  { id: 1, name: 'Kim' },
  { id: 2, name: 'Lee' }
];
const user = users.find(u => u.id === 2);
// { id: 2, name: 'Lee' }`,
        },
        {
          category: "search",
          name: "findIndex",
          desc: "제공된 테스트 함수를 만족하는 <strong>첫 번째 요소의 인덱스</strong>를 반환합니다.",
          type: "read",
          code: `const arr = [5, 12, 8];
arr.findIndex(x => x > 10); // 1`,
        },
        {
          category: "search",
          name: "findLast",
          desc: "배열을 역순으로 검색하여 조건을 만족하는 첫 번째 요소를 반환합니다.",
          type: "read",
          isNew: true,
          code: `const arr = [5, 12, 8, 13];
arr.findLast(x => x > 10); // 13`,
        },
        {
          category: "search",
          name: "includes",
          desc: "배열에 특정 요소가 포함되어 있는지 여부를 확인합니다 (true/false).",
          type: "read",
          code: `['a', 'b', 'c'].includes('a'); // true`,
        },
        {
          category: "search",
          name: "indexOf",
          desc: "배열에서 지정된 요소를 찾을 수 있는 첫 번째 인덱스를 반환합니다.",
          type: "read",
          code: `['a', 'b', 'a'].indexOf('a'); // 0`,
        },

        // 3. 순회 및 변형
        {
          category: "iterate",
          name: "forEach",
          desc: "배열의 각 요소에 대해 제공된 함수를 한 번씩 실행합니다.",
          type: "read",
          code: `['a', 'b'].forEach(x => console.log(x));`,
        },
        {
          category: "iterate",
          name: "map",
          desc: "배열 내의 모든 요소 각각에 대하여 주어진 함수를 호출한 결과를 모아 <strong>새로운 배열</strong>을 반환합니다.",
          type: "immutable",
          code: `[1, 2].map(x => x * 2); 
// [2, 4]`,
        },
        {
          category: "iterate",
          name: "filter",
          desc: "주어진 함수의 테스트를 통과하는 모든 요소를 모아 <strong>새로운 배열</strong>을 반환합니다.",
          type: "immutable",
          code: `[1, 10, 5].filter(x => x > 5);
// [10]`,
        },
        {
          category: "iterate",
          name: "filter (객체 필터링)",
          desc: "객체 배열에서 특정 상태나 조건을 가진 <strong>다수의 객체들만</strong> 골라내어 새로운 배열을 만듭니다.",
          type: "immutable",
          code: `const items = [
  { id: 1, done: true },
  { id: 2, done: false },
  { id: 3, done: true }
];
const completed = items.filter(item => item.done);
// [{...done: true}, {...done: true}]`,
        },
        {
          category: "iterate",
          name: "map (특정 객체 수정)",
          desc: "객체 배열에서 <strong>조건을 만족하는 특정 객체들</strong>의 값만 변경하여 새로운 배열을 반환합니다. 불변성을 유지하는 핵심 패턴입니다.",
          type: "immutable",
          code: `const items = [
  { id: 1, state: 'wait' },
  { id: 2, state: 'wait' },
  { id: 3, state: 'done' }
];
const updated = items.map(item => 
  item.state === 'wait' 
    ? { ...item, state: 'run' } 
    : item
);`,
        },
        {
          category: "iterate",
          name: "map (모든 객체 기존값 수정)",
          desc: "객체 배열의 <strong>모든 객체</strong>가 이미 가지고 있는 기존 속성값을 일괄 변경하여 새로운 배열을 반환합니다.",
          type: "immutable",
          code: `const products = [
  { id: 1, price: 1000 },
  { id: 2, price: 2000 }
];
// 모든 상품 가격을 10% 인상
const updatedProducts = products.map(p => ({
  ...p,
  price: p.price * 1.1
}));`,
        },
        {
          category: "iterate",
          name: "map (상태/Props 안전한 복사)",
          desc: "Vue/React에서 <code style='color:#fca5a5;'>[...arr]</code>를 쓰더라도 <strong>내부 객체는 원본 참조를 유지</strong>하는 문제를 해결합니다. 객체까지 새로 얕은 복사하여 원본(Props)을 보호합니다.",
          type: "immutable",
          code: `const propsItems = [{ id: 1, val: 10 }];

// ❌ 잘못된 예 (props 원본 내부 객체 변형 발생)
// const bad = [...propsItems]; 
// bad[0].val = 20; // 경고: Mutating props!

// ✅ 올바른 예 (map과 전개 연산자로 객체도 새로 생성)
const safeItems = propsItems.map(item => ({
  ...item,   // 기존 속성 복제
  val: 20    // 수정할 속성 덮어쓰기
}));`,
        },
        {
          category: "iterate",
          name: "forEach (객체 직접 수정)",
          desc: "객체 배열을 순회하면서 <strong>조건을 만족하는 객체들</strong>의 속성을 원본에 직접 반영(Mutate)합니다.",
          type: "mutating",
          code: `const items = [
  { id: 1, state: 'wait' },
  { id: 2, state: 'wait' },
  { id: 3, state: 'done' }
];
items.forEach(item => {
  if (item.state === 'wait') {
    item.state = 'run';
  }
});`,
        },
        {
          category: "iterate",
          name: "forEach (모든 객체 기존값 수정)",
          desc: "객체 배열의 <strong>모든 객체</strong>를 순회하며 원본이 가진 기존 속성값을 직접 계산하여 교체(Mutate)합니다.",
          type: "mutating",
          code: `const items = [
  { id: 1, price: 1000 },
  { id: 2, price: 2000 }
];
// 모든 상품 가격을 10% 인상 (원본 수정)
products.forEach(p => {
  p.price = p.price * 1.1;
});`,
        },
        {
          category: "iterate",
          name: "reduce",
          desc: "배열의 각 요소에 대해 리듀서(reducer) 함수를 실행하여 <strong>하나의 결과값</strong>을 반환합니다.",
          type: "read",
          code: `[1, 2, 3].reduce((acc, cur) => acc + cur, 0);
// 6`,
        },
        {
          category: "iterate",
          name: "reduce (객체 합산/분류)",
          desc: "객체 배열을 순회하며 속성값들을 <strong>합산</strong>하거나 원하는 형태의 데이터 객체로 가공합니다.",
          type: "read",
          code: `const cart = [
  { item: '🍎', price: 1000 },
  { item: '🍌', price: 2000 }
];
const total = cart.reduce((acc, cur) => acc + cur.price, 0);
// total: 3000`,
        },
        {
          category: "iterate",
          name: "reduce (단일 조건 그룹화)",
          desc: "<strong>단일 속성(category)</strong>만을 기준으로 객체 배열을 그룹화하여 새로운 데이터 구조를 만듭니다.",
          type: "immutable",
          code: `const data = [
  {code: 1, category: '사과', name: '제주 사과', price: 1500},
  {code: 2, category: '사과', name: '서울 사과', price: 2500}
];
const grouped = Object.values(data.reduce((acc, cur) => {
  const key = cur.category;
  if (!acc[key]) {
    acc[key] = { category: cur.category, items: [] };
  }
  acc[key].items.push({ name: cur.name, price: cur.price });
  return acc;
}, {}));
// 결과:
// [
//   {
//     category: '사과',
//     items: [
//       {name: '제주 사과', price: 1500},
//       {name: '서울 사과', price: 2500}
//     ]
//   }
// ]`,
        },
        {
          category: "iterate",
          name: "reduce (다중 조건 그룹화)",
          desc: "<strong>다중 속성(code, category)</strong>을 결합한 키로 객체 배열을 묶어서 하위 배열(items)이 있는 구조로 변환합니다.",
          type: "immutable",
          code: `const data = [
  {code: 1, category: '바나나', name: '제주바나나', price: 5000},
  {code: 1, category: '바나나', name: '서울바나나', price: 6000}
];
const grouped = Object.values(data.reduce((acc, cur) => {
  const key = cur.code + '-' + cur.category;
  if (!acc[key]) {
    acc[key] = { code: cur.code, category: cur.category, items: [] };
  }
  acc[key].items.push({ name: cur.name, price: cur.price });
  return acc;
}, {}));
// 결과:
// [
//   {
//     code: 1,
//     category: '바나나',
//     items: [
//       {name: '제주바나나', price: 5000},
//       {name: '서울바나나', price: 6000}
//     ]
//   }
// ]`,
        },
        {
          category: "iterate",
          name: "flatMap",
          desc: "매핑 함수를 사용해 각 요소를 매핑한 다음, 결과를 새로운 배열로 평탄화(depth 1)합니다.",
          type: "immutable",
          code: `[1, 2].flatMap(x => [x, x * 2]);
// [1, 2, 2, 4]`,
        },
        {
          category: "iterate",
          name: "some",
          desc: "배열 안의 <strong>어떤 요소라도</strong> 주어진 판별 함수를 통과하는지 테스트합니다.",
          type: "read",
          code: `[1, 2, 3].some(x => x > 2); // true`,
        },
        {
          category: "iterate",
          name: "every",
          desc: "배열 안의 <strong>모든 요소</strong>가 주어진 판별 함수를 통과하는지 테스트합니다.",
          type: "read",
          code: `[1, 2, 3].every(x => x > 0); // true`,
        },

        // 4. 정렬 및 순서
        {
          category: "sort",
          name: "sort",
          desc: "배열의 요소를 적절한 위치에 정렬한 후 그 배열을 반환합니다. (기본은 문자열 유니코드 순서)",
          type: "mutating",
          code: `const arr = [3, 1, 2];
arr.sort();
// arr: [1, 2, 3]`,
        },
        {
          category: "sort",
          name: "sort (객체 속성 정렬)",
          desc: "비교 함수를 제공하여 객체 배열의 <strong>특정 속성을 기준으로 오름차순/내림차순 정렬</strong>합니다.",
          type: "mutating",
          code: `const students = [
  { name: 'A', score: 80 },
  { name: 'B', score: 95 }
];
// 점수 오름차순 정렬 (내림차순은 b.score - a.score)
students.sort((a, b) => a.score - b.score);
// A(80) -> B(95)`,
        },
        {
          category: "sort",
          name: "toSorted",
          desc: "sort()와 같지만 원본을 변경하지 않고 <strong>정렬된 새 배열</strong>을 반환합니다.",
          type: "immutable",
          isNew: true,
          code: `const arr = [3, 1, 2];
const sorted = arr.toSorted();
// sorted: [1, 2, 3], arr: [3, 1, 2]`,
        },
        {
          category: "sort",
          name: "reverse",
          desc: "배열의 순서를 반전합니다.",
          type: "mutating",
          code: `const arr = [1, 2];
arr.reverse(); 
// arr: [2, 1]`,
        },
        {
          category: "sort",
          name: "toReversed",
          desc: "reverse()와 같지만 원본을 변경하지 않고 <strong>순서가 반전된 새 배열</strong>을 반환합니다.",
          type: "immutable",
          isNew: true,
          code: `const arr = [1, 2];
const reversed = arr.toReversed();
// reversed: [2, 1], arr: [1, 2]`,
        },

        // 5. 구조 변환
        {
          category: "transform",
          name: "join",
          desc: "배열의 모든 요소를 연결해 <strong>하나의 문자열</strong>로 만듭니다.",
          type: "read",
          code: `['a', 'b'].join('-'); // "a-b"`,
        },
        {
          category: "transform",
          name: "slice",
          desc: "배열의 <strong>일부분</strong>을 얕은 복사본으로 새로운 배열 객체로 반환합니다.",
          type: "immutable",
          code: `const arr = ['a', 'b', 'c'];
arr.slice(1); // ['b', 'c']`,
        },
        {
          category: "transform",
          name: "concat",
          desc: "인자로 주어진 배열이나 값들을 기존 배열에 합쳐서 <strong>새 배열</strong>을 반환합니다.",
          type: "immutable",
          code: `['a'].concat(['b']); // ['a', 'b']`,
        },
        {
          category: "transform",
          name: "flat",
          desc: "모든 하위 배열 요소를 지정한 깊이까지 재귀적으로 이어붙인 새로운 배열을 생성합니다.",
          type: "immutable",
          code: `[1, [2, 3]].flat(); // [1, 2, 3]`,
        },
        {
          category: "transform",
          name: "Array.from",
          desc: "유사 배열 객체나 반복 가능한 객체를 얕게 복사해 <strong>새로운 Array 객체</strong>를 만듭니다.",
          type: "immutable",
          code: `Array.from('foo');
// ['f', 'o', 'o']`,
        },
        {
          category: "transform",
          name: "fill",
          desc: "배열의 시작 인덱스부터 끝 인덱스까지 정적 값 하나로 채웁니다.",
          type: "mutating",
          code: `[1, 2, 3].fill(0);
// [0, 0, 0]`,
        },
      ];

      function renderCards() {
        apiData.forEach((api) => {
          const container = document.getElementById(`grid-${api.category}`);
          if (!container) return;

          const card = document.createElement("div");
          card.className = "card";

          let badgeClass = "";
          let badgeText = "";

          if (api.type === "mutating") {
            badgeClass = "badge mutating";
            badgeText = "Mutating";
          } else if (api.type === "immutable") {
            badgeClass = "badge immutable";
            badgeText = "New Array";
          } else {
            badgeClass = "badge read";
            badgeText = "Read/Value";
          }

          const newTag = api.isNew
            ? '<span class="new-tag">NEW (ES2023)</span>'
            : "";

          card.innerHTML = `
                    <div class="card-header">
                        <div class="method-name">${api.name}${newTag}</div>
                        <div class="${badgeClass}">${badgeText}</div>
                    </div>
                    <div class="card-desc">${api.desc}</div>
                    <div class="code-block">
                        ${highlightCode(api.code)}
                    </div>
                `;

          container.appendChild(card);
        });
      }

      function highlightCode(code) {
        // 매우 간단한 구문 강조 (Regex)
        return code
          .replace(
            /\/\/.*$/gm,
            (match) => `<span class="comment">${match}</span>`,
          )
          .replace(
            /'[^']*'/g,
            (match) => `<span class="string">${match}</span>`,
          )
          .replace(
            /\b(const|let|var|function|return|if|else)\b/g,
            (match) => `<span class="keyword">${match}</span>`,
          )
          .replace(
            /\b\d+\b/g,
            (match) => `<span class="number">${match}</span>`,
          )
          .replace(/\n/g, "<br>");
      }

      // 실행
      document.addEventListener("DOMContentLoaded", renderCards);
    </script>
  </body>
</html>
