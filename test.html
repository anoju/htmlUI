<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>test</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #eee;
        line-height: 1.2;
      }
      .wrap {
        background: #fff;
        max-width: 480px;
        padding: 40px 20px;
        margin: 0 auto;
        min-height: 100vh;
      }
      .item + .item {
        margin-top: 20px;
      }
      .lbl {
        display: block;
        margin-bottom: 8px;
      }
      .button {
        display: block;
        width: 100%;

        line-height: 40px;
        height: 40px;
        background: blue;
        color: #fff;
        font-size: 16px;
        text-align: center;
        border: none;
        border-radius: 4px;
      }
      .input {
        display: block;
        width: 100%;
        height: 40px;
        padding: 5px 10px;
        background: #fff;
        color: #333;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="item">
        <label class="lbl" for="button-1">버튼 레이블</label>
        <button
          id="button-1"
          class="button"
          aria-label="더보기"
          title="바로가기"
        >
          버튼22
        </button>
      </div>

      <div class="item">
        <label class="lbl" for="input-1">input 레이블</label>
        <input
          type="text"
          id="input-1"
          class="input"
          placeholder="숫자를 입력하세요"
        />
      </div>
    </div>
  </body>
</html>
