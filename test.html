<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>test</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #eee;
        line-height: 1.2;
      }
      .wrap {
        background: #fff;
        max-width: 480px;
        padding: 40px 20px;
        margin: 0 auto;
        min-height: 100vh;
      }
      .item + .item {
        margin-top: 20px;
      }
      .lbl {
        display: block;
        margin-bottom: 8px;
      }
      .button {
        display: block;
        width: 100%;

        line-height: 40px;
        height: 40px;
        background: blue;
        color: #fff;
        font-size: 16px;
        text-align: center;
        border: none;
        border-radius: 4px;
      }
      .input {
        display: block;
        width: 100%;
        height: 40px;
        padding: 5px 10px;
        background: #fff;
        color: #333;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <h1 role="text"><span>이거시</span> 과연 <strong>제목</strong>이냐?</h1>
    </div>
  </body>
</html>
