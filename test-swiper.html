<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12.1.3/swiper-bundle.min.css"
    />

    <!-- Demo styles -->
    <style>
      body {
        background: #eee;
        font-family:
          Helvetica Neue,
          Helvetica,
          Arial,
          sans-serif;
        font-size: 14px;
        color: #000;
        margin: 0;
        padding: 0;
      }

      .swiper {
        width: 100%;
        height: 300px;
        padding-bottom: 50px;
        box-sizing: border-box;
      }

      .swiper-slide {
        width: 300px;
        text-align: center;
        font-size: 18px;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #000;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .swiper {
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>

  <body>
    <h1>테스트</h1>
    <!-- Swiper -->
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">Slide 1</div>
        <div class="swiper-slide">Slide 2</div>
        <div class="swiper-slide">Slide 3</div>
        <div class="swiper-slide">Slide 4</div>
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12.1.3/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
      /**
       * Swiper 슬라이드 웹 접근성 처리 (노출되는 슬라이드 외 aria-hidden 처리)
       */
      function updateSwiperA11y(swiper) {
        if (!swiper || !swiper.slides) return;

        swiper.slides.forEach((slide) => {
          // Swiper가 부여하는 가시성/활성 클래스 확인
          const isFullyVisible = slide.classList.contains(
            "swiper-slide-fully-visible",
          );
          const isActive = slide.classList.contains("swiper-slide-active");

          // 완전히 보이거나, 현재 활성화된 슬라이드인 경우 잠금 해제
          if (isFullyVisible || isActive) {
            slide.removeAttribute("aria-hidden");
            // slide.removeAttribute("inert");
          } else {
            slide.setAttribute("aria-hidden", "true");
            // slide.setAttribute("inert", "true");
          }
        });
      }

      var swiper = new Swiper(".mySwiper", {
        observer: true,
        observeParents: true,
        // watchOverflow: true, // 기본값: true

        // 활성 슬라이드를 중앙에 배치하되 양 끝 여백은 없앱니다.
        centeredSlides: true,
        centeredSlidesBounds: true,
        slidesPerView: "auto",
        // loop: false, // 기본값: false
        slideToClickedSlide: true,

        // 슬라이드가 적을 때(화면이 넓을 때) 그룹 전체를 중앙으로 모아 점프 현상 방지
        centerInsufficientSlides: true,
        // normalizeSlideIndex: true, // 기본값: true
        watchSlidesProgress: true,

        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
        on: {
          init: function () {
            updateSwiperA11y(this);
          },
          // 이동 시작 시 잠금 해제 (인덱스 변화 상관없이 무조건)
          // transitionStart: function () {
          //   this.slides.forEach((s) => {
          //     s.removeAttribute("aria-hidden");
          //     s.removeAttribute("inert");
          //   });
          // },
          // 어떤 이동이든 멈추면 가시성 다시 체크
          transitionEnd: function () {
            updateSwiperA11y(this);
          },
          resize: function () {
            updateSwiperA11y(this);
            this.update();
          },
        },
      });
    </script>
  </body>
</html>
